default_stages: ['pre-commit']
repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
    - id: shellcheck
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
        # fix unused imports and sort them
      - id: ruff
        args: ["--config", "archinstoo/pyproject.toml", "--extend-select", "I", "--fix"]
        # format the code
      - id: ruff-format
        args: ["--config", "archinstoo/pyproject.toml"]
        # run the linter
      - id: ruff
        args: ["--config", "archinstoo/pyproject.toml"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    # general hooks:
    - id: check-added-large-files  # Prevent giant files from being committed
      args: ['--maxkb=5000']
    - id: check-merge-conflict  # Check for files that contain merge conflict strings
    - id: check-symlinks  # Checks for symlinks which do not point to anything
    - id: check-yaml  # Attempts to load all yaml files to verify syntax
    - id: destroyed-symlinks  # Detects symlinks which are changed to regular files
    - id: detect-private-key  # Checks for the existence of private keys
    # Python specific hooks:
    - id: check-ast  # Simply check whether files parse as valid python
    - id: check-docstring-first  # Checks for a common error of placing code before the docstring
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
    - id: mypy
      args: [
        '--config-file=archinstoo/pyproject.toml'
      ]
      exclude: ^archinstoo/tests/
      fail_fast: true
  - repo: https://github.com/pycqa/pylint
    rev: v4.0.5
    hooks:
    - id: pylint
      args: ['--rcfile=archinstoo/pyproject.toml', '--init-hook', 'import sys; sys.path.insert(0, "archinstoo")']
      exclude: ^archinstoo/tests/
      additional_dependencies:
        - pyparted>=3.13.0
      fail_fast: true
      require_serial: true